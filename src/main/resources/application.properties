server.host=0.0.0.0
server.port=8765
server.thread-pool-size=32
server.socket-timeout-ms=60000
server.backlog=100


db.url=jdbc:postgresql://localhost:5432/clinic_db
db.username=postgres
db.password=admin
db.driver=org.postgresql.Driver
db.dialect=org.hibernate.dialect.PostgreSQLDialect
db.pool-size=10
db.show-sql=false
db.format-sql=false

db.hbm2ddl=update

security.jwt.secret=ChangeMeToASecureSecretAtLeast32BytesLong_ClinicServerDefault
security.jwt.issuer=clinic-server
security.jwt.access-ttl-minutes=120
security.bcrypt.cost=10

mail.enabled=false
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.starttls=true
mail.smtp.auth=true
mail.username=your-mail@example.com
mail.password=your-app-password
mail.from=no-reply@clinic.local
mail.from-name=Клиника / Запись к врачу

reminder.enabled=true
reminder.scan-period-seconds=60
reminder.lead-hours=24
reminder.worker-threads=2

bootstrap.create-default-admin=true
bootstrap.admin.username=admin
bootstrap.admin.password=change-me-admin-password
bootstrap.admin.email=admin@clinic.local
bootstrap.admin.full-name=System Administrator
bootstrap.seed-default-data=true
bootstrap.seed-resource=db/seed.sql
bootstrap.seed-user-password=password
